<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Patient Dashboard</title>

<style>

body{
    margin:0;
    font-family:Arial,sans-serif;
    background:linear-gradient(to right,#4facfe,#00f2fe);
}

.dashboard-container{
    text-align:center;
    margin-top:70px;
    color:white;
}

.dashboard-cards{
    display:flex;
    justify-content:center;
    flex-wrap:wrap;
    gap:25px;
    margin-top:40px;
}

.card{
    width:250px;
    padding:25px;
    background:white;
    color:#333;
    border-radius:15px;
    cursor:pointer;
    box-shadow:0 5px 15px rgba(0,0,0,0.2);
    transition:0.3s;
}

.card:hover{
    transform:translateY(-8px);
    background:#007bff;
    color:white;
}

.logout-btn{
    margin-top:40px;
    padding:12px 25px;
    background:red;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

.logout-btn:hover{
    background:darkred;
}

</style>

</head>
<body>

<div class="dashboard-container">

    <h1>Welcome Patient</h1>

    <div class="dashboard-cards">

        <div class="card" onclick="openProfile()">
            <h3>My Profile</h3>
            <p>View your profile details</p>
        </div>

        <div class="card" onclick="bookAppointment()">
            <h3>Book Appointment</h3>
            <p>Book appointment with doctors</p>
        </div>

        <div class="card" onclick="myAppointments()">
            <h3>My Appointments</h3>
            <p>View booked appointments</p>
        </div>

        <div class="card" onclick="openPrescription()">
            <h3>Prescription</h3>
            <p>View doctor prescriptions</p>
        </div>

        <div class="card" onclick="openBilling()">
            <h3>Billing</h3>
            <p>View consultation bills</p>
        </div>

    </div>

    <button class="logout-btn" onclick="logout()">
        Logout
    </button>

</div>

<script>

function openProfile(){
    window.location.href="patient_profile.html";
}

function bookAppointment(){
    window.location.href="book_appointment_page.html";
}

function myAppointments(){
    window.location.href="appointment_list.html";
}

function openPrescription(){
    window.location.href="prescription.html";
}

function openBilling(){
    window.location.href="billing_generate_page.html";
}

function logout(){
    alert("Logged Out Successfully");
    window.location.href="loginpage.html";
}

</script>

</body>
</html>
