<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Dashboardt</title>



<style>
body {
    font-family: Arial;
    margin: 0;
    background: #f4f6f9;
}


.header {
    background: #007bff;
    color: white;
    padding: 15px;
    text-align: center;
}


.container {
    padding: 20px;
}

.cards {
    display: flex;
    gap: 20px;
    justify-content: space-around;
}

.card {
    width: 200px;
    padding: 20px;
    background: white;
    border-radius: 10px;
    text-align: center;
    box-shadow: 0 4px 10px rgba(0,0,0,0.2);
}

.card h3 {
    margin: 10px 0;
}


.actions {
    margin-top: 30px;
    text-align: center;
}

button {
    padding: 10px 20px;
    margin: 10px;
    border: none;
    border-radius: 5px;
    background: #007bff;
    color: white;
    cursor: pointer;
}

button:hover {
    background: #0056b3;
}
</style>

</head>

<body>

<div class="header">
    <h2>Hospital Dashboard</h2>
</div>

<div class="container">

<div class="cards">

<div class="card">
    <h3>Patients</h3>
    <p>0</p>
</div>

<div class="card">
    <h3>Doctors</h3>
    <p>0</p>
</div>

<div class="card">
    <h3>Appointments</h3>
    <p>0</p>
</div>

<div class="card">
    <h3>Upcoming</h3>
    <p>0</p>
</div>

</div>

<div class="actions">
    <button onclick="location.href='book_appointment_page.html'">Book Appointment</button>
    <button onclick="location.href='appointment_list.html'">View Appointments</button>
</div>

</div>

</body>
</html>
