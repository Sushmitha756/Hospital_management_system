<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Forgot Password</title>

<style>
body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right, white, rgb(159,159,237));
}

.container{
    width:350px;
    margin:80px auto;
    background:white;
    padding:25px;
    border-radius:12px;
    box-shadow:0 8px 20px rgba(0,0,0,0.2);
    text-align:center;
}

input{
    width:90%;
    padding:10px;
    margin:8px 0;
    border-radius:5px;
    border:1px solid #ccc;
}

button{
    width:95%;
    padding:10px;
    margin-top:10px;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
}

button:hover{
    background:green;
}

h2{
    color:#333;
}
</style>
</head>

<body>

<div class="container">

<h2>Forgot Password</h2>

<label>Email *</label>
<input type="email" id="email" placeholder="abc@gmail.com" required>
<label>New Password *</label>
<input type="password" id="newPassword" placeholder="Sushma@12" required>

<label>Confirm Password *</label>
<input type="password" id="confirmPassword" placeholder="Sushma@12" required>
<button type="button" onclick="sendOTP()">Send OTP</button>

<input type="text" id="otp" placeholder="Enter OTP">

<button type="button" onclick="verifyOTP()">Verify OTP</button>

</div>

<script>

let generatedOTP = "";

function sendOTP(){

    let email = document.getElementById("email").value;

    if(email === ""){
        alert("Please enter email");
        return;
    }

    generatedOTP = Math.floor(1000 + Math.random() * 9000);

    alert("OTP Sent Successfully");
    
    // Demo only
    alert("Your OTP is : " + generatedOTP);
}

function verifyOTP(){

    let userOTP = document.getElementById("otp").value;
    let newPassword = document.getElementById("newPassword").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    if (generatedOTP === "") {
        alert("Please send OTP first");
        return;
    }

    if (Number(userOTP) !== generatedOTP) {
        alert("Invalid OTP");
        return;
    }

    if (newPassword !== confirmPassword) {
        alert("Passwords do not match");
        return;
    }

    alert("OTP Verified Successfully!");
    window.location.href = "Loginpage.html";
}
</script>

</body>
</html>
