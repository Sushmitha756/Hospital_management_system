<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>forgot password</title>
    <style>
        body{
            background: linear-gradient(To right,white,rgb(159, 159, 237));
        }
        button{
            background: blue;
            text-align: center;
            color: white;
        }
        button:hover{
            background-color: green;
        }
        .container {
    width: 350px;
    margin: 80px auto;
    background: white;
    padding: 25px;
    border-radius: 12px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.2);
    text-align: center;
}
input{
    width: 90%;
    padding: 8px;
    margin: 8px 0;
    border-radius: 5px;
    border: 1px solid #ccc;
}
    </style>
</head>
<body>
    <div class="container">
    <h2>Forgot password</h2>
    <form action="Loginpage.html">
        
        <label for="email">Enter Email *</label>
        <input type="email" id="email" placeholder="Abe@gmail.com" required><br><br>
        <button onclick="sendOTP()">Send OTP *</button>
        <input type="text" id="otp" placeholder="enter otp" required> <br>
       <button type="button" onclick="goToLogin()">reset</button>
      
    </form>
    </div>
</body>
<script>
   let generatedOTP;


function sendOTP() {
    let email = document.getElementById("email").value;

    if (email === "") {
        alert("Please enter email");
        return;
    }

    generatedOTP = Math.floor(1000 + Math.random() * 9000);
    alert("OTP sent: " + generatedOTP); // demo only
}


function verifyOTP() {
    let userOTP = document.getElementById("otp").value;

    if (userOTP == generatedOTP) {
        alert("OTP Verified Successfully");
    } else {
        alert("Invalid OTP");
    }
}
    function goToLogin(){
        alert("Password reset successful")
        window.location.href="Loginpage.html";

    }
</script>
</html>
