<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
   <link rel="stylesheet" href="loginpage.css">
</head>
<script>
function loginUser() {

    let email = document.getElementById("email").value;
    let password = document.getElementById("password").value;

    fetch("http://localhost:8081/login", {
        method: "POST",
        headers: {
            "Content-Type": "application/json"
        },
        body: JSON.stringify({
            email: email,
            password: password
        })
    })
    .then(response => response.text())
    .then(data => {

        if(data === "Doctor"){
            localStorage.setItem("email",email);
            window.location.href = "doctor_dashboard.html";
        }
        else if(data === "Patient"){
            window.location.href = "patient_dashboard.html";
        }
            else if(data === "Email not registered. Please register first."){
        
        let goRegister = confirm("Email not registered. Do you want to register?");

        if(goRegister){
            window.location.href = "register.html";
        }
    }
        else{
            alert(data);
        }

    });
}
</script>
<body>
    <h2>Hospital Management System</h2>
    <div class="container">
    <h2>Login page</h2>
    <form action="/">
        <label for="email">Email *:</label>
        <input type="email" id="email" required><br><br>
                <label for="password" >Enter your password *:</label>
        <input type="password" id="password" required><br><br>
  <select name="role" id="role" required>
        <option value="">Select Role</option>
   
    <option value="doctor">Doctor</option>
    <option value="Patient">Patient</option>
    <option value="pharmacist">Pharmacist</option>
  </select>
  <div class="checkbox">
    <input type="checkbox" id="remember">
    <label for="remember">Remember me</label>
</div>
 <button type="button" onclick="loginUser()">Login</button><br><br>
<a href="forgot_password_page.html" class="forgot">Forgot Password?</a>
   
 </form>
 </div>
 </body>


</html>
