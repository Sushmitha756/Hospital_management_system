<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
   <link rel="stylesheet" href="loginpage.css">
</head>
<body>
    <h2>Hospital Management System</h2>
    <div class="container">
    <h2>Login page</h2>
    <form action="/">
        <label for="email">Email *:</label>
        <input type="email" id="email" required><br><br>
                <label for="password" >Enter your password *:</label>
        <input type="password" id="password" required><br><br>
  <select name="role" id="role" required>
        <option value="select">select</option>
    <option value="admin">Admin</option>
    <option value="doctor">Doctor</option>
    <option value="Patient">Patient</option>
    <option value="pharmacist">Pharmacist</option>
  </select>
  <div class="checkbox">
    <input type="checkbox" id="remember">
    <label for="remember">Remember me</label>
</div>
 <button type="submit">Login</button><br><br>
<a href="forgot_password_page.html" class="forgot">Forgot Password?</a>
   
 
 <h3>Register</h3>
 <select id="role1">
    <option value="">select</option>
    <option value="Doctor">Doctor</option>
    <option value="Patient">Patient</option>
 </select>
 <button type="button" onclick="goToRegister()">Go</button>
    </form>
   </div>
</body>
<script>
function goToRegister(){
    let role=document.getElementById("role1").value;
    if(role==="Patient"){
        window.location.href="patient_register_page.html";
    }
    else if(role==="Doctor"){
        window.location.href="doctor_registration_page.html";
    }
    else{
    alert("Please select role");
}
}

</script>
</html>
