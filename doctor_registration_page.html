<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Doctor Registration</title>

<style>

body{
    font-family: Arial, sans-serif;
    background: linear-gradient(to right,#8ec8ea,#ffffff);
    margin:0;
    padding:0;
}

.container{
    width:600px;
    margin:30px auto;
    background:white;
    padding:25px;
    border-radius:10px;
    box-shadow:0 0 10px gray;
}

h2{
    text-align:center;
    color:#333;
}

label{
    font-weight:bold;
}

input,select{
    width:100%;
    padding:10px;
    margin-top:5px;
    margin-bottom:12px;
    border:1px solid #ccc;
    border-radius:5px;
    box-sizing:border-box;
}

button{
    width:100%;
    padding:12px;
    background:blue;
    color:white;
    border:none;
    border-radius:5px;
    cursor:pointer;
    font-size:16px;
}

button:hover{
    background:green;
}

</style>

</head>

<body>

<div class="container">

<h2>Doctor Registration</h2>

<form onsubmit="registerDoctor(event)">

<label>Full Name *</label>
<input type="text" id="name" required>

<label>Email *</label>
<input type="email" id="email" required>

<label>Phone Number *</label>
<input type="text" id="phone" required>

<label>Specialization *</label>
<select id="specialization" required>
    <option value="">Select</option>
    <option>Cardiology</option>
    <option>Neurology</option>
    <option>Gynecology</option>
    <option>Pediatrician</option>
    <option>Dermatology</option>
</select>

<label>Qualification *</label>
<input type="text" id="qualification" required>

<label>Experience *</label>
<input type="text" id="experience" required>

<label>Consultation Fee *</label>
<input type="number" id="fee" required>

<label>Password *</label>
<input type="password" id="password" required>

<label>Confirm Password *</label>
<input type="password" id="confirmPassword" required>

<button type="submit">Register</button>

</form>

</div>

<script>

function registerDoctor(event){

    event.preventDefault();

    let password = document.getElementById("password").value;
    let confirmPassword = document.getElementById("confirmPassword").value;

    if(password !== confirmPassword){
        alert("Passwords do not match");
        return;
    }

    let doctorData = {

        name: document.getElementById("name").value,
        email: document.getElementById("email").value,
        phone: document.getElementById("phone").value,
        specialization: document.getElementById("specialization").value,
        qualification: document.getElementById("qualification").value,
        experience: document.getElementById("experience").value,
        fee: document.getElementById("fee").value,
        password: password

    };

    fetch("http://localhost:8081/doctor/register", {

        method: "POST",

        headers: {
            "Content-Type": "application/json"
        },

        body: JSON.stringify(doctorData)

    })

    .then(response => {

        if(!response.ok){
            throw new Error("Registration Failed");
        }

        return response.json();
    })

    .then(data => {

        alert("Doctor Registered Successfully");

        window.location.href = "Loginpage.html";

    })

    .catch(error => {

        console.log(error);

        alert("Registration Failed");

    });

}

</script>

</body>
</html>
